version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cantik-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: skin_analyzer
      MYSQL_USER: cantik_user
      MYSQL_PASSWORD: cantik_password123
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build: .
    container_name: cantik-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=skin_analyzer
      - DB_USER=cantik_user
      - DB_PASSWORD=cantik_password123
    depends_on:
      - mysql
    env_file:
      - .env